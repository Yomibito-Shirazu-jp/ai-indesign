<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ai-inDesign</title>
    <style>
        :root {
            --uxp-host-background: #323232;
            --uxp-host-text-color: #E6E6E6;
            --uxp-host-brand-color: #FF3366; /* Adobe InDesign Pinkish */
            --msg-bg-user: #4A4A4A;
            --msg-bg-ai: #2B2B2B;
        }

        body {
            background-color: var(--uxp-host-background);
            color: var(--uxp-host-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background-color: #242424;
            border-bottom: 1px solid #444;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #fca311; /* Yellow for initializing */
        }
        .status-dot.connected { background-color: #2ecc71; } /* Green */
        .status-dot.disconnected { background-color: #e74c3c; } /* Red */

        .settings-btn {
            background: none;
            border: none;
            color: #AAA;
            cursor: pointer;
            padding: 4px;
        }
        .settings-btn:hover { color: #FFF; }

        /* Settings View (Hidden by default) */
        #settings-view {
            display: none;
            padding: 16px;
            background: #2A2A2A;
            border-bottom: 1px solid #444;
            flex-direction: column;
            gap: 12px;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .setting-group label {
            font-size: 11px;
            color: #AAA;
        }
        input[type="password"], input[type="text"], select {
            background: #1E1E1E;
            border: 1px solid #555;
            color: #EEE;
            padding: 6px;
            border-radius: 4px;
            width: 100%;
        }
        .mcp-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }
        .mcp-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #DDD;
            cursor: pointer;
        }
        .close-settings {
            background: #444;
            color: #FFF;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
            align-self: flex-end;
        }
        .close-settings:hover { background: #555; }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 90%;
            padding: 10px 12px;
            border-radius: 8px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .msg-user {
            background-color: var(--msg-bg-user);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg-ai {
            background-color: var(--msg-bg-ai);
            align-self: flex-start;
            border: 1px solid #444;
            border-bottom-left-radius: 2px;
        }

        .msg-system {
            background: transparent;
            color: #888;
            font-size: 11px;
            align-self: center;
            text-align: center;
            padding: 4px;
        }

        /* Input Area */
        .input-area {
            display: flex;
            padding: 12px;
            background-color: #242424;
            border-top: 1px solid #444;
            gap: 8px;
        }

        #chat-input {
            flex: 1;
            background-color: #1E1E1E;
            border: 1px solid #555;
            color: #E6E6E6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            resize: none;
            height: 36px;
            font-family: inherit;
        }
        #chat-input:focus {
            outline: none;
            border-color: var(--uxp-host-brand-color);
        }

        #send-btn {
            background-color: var(--uxp-host-brand-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #send-btn:hover {
            opacity: 0.9;
        }
        #send-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        /* Connecting overlay */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(30, 30, 30, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #555;
            border-top-color: var(--uxp-host-brand-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <div id="status-indicator" class="status-dot"></div>
            <span id="header-title">Ai-inDesign</span>
        </div>
        <button class="settings-btn" id="toggle-settings" title="接続・MCP設定">⚙️</button>
    </header>

    <div id="settings-view">
        <div class="setting-group">
            <label>AIプロバイダー (任意)</label>
            <select id="ai-provider">
                <option value="claude">Claude (Anthropic)</option>
                <option value="openai">ChatGPT (OpenAI)</option>
                <option value="gemini">Gemini (Google)</option>
                <option value="external" selected>外部MCPクライアントを使用</option>
            </select>
        </div>
        <div class="setting-group" id="api-key-group" style="display:none;">
            <label>APIキー</label>
            <input type="password" id="api-key" placeholder="sk-...">
        </div>
        
        <div class="setting-group" style="margin-top: 8px;">
            <label>拡張MCP接続オプション (サーバー側で有効化)</label>
            <div class="mcp-options">
                <label><input type="checkbox" id="mcp-memory" checked> 🧠 メモリ (長期記憶)</label>
                <label><input type="checkbox" id="mcp-filesystem" checked> 📂 ファイルシステム (ローカル読込)</label>
                <label><input type="checkbox" id="mcp-wiki" checked> 📖 Deep wiki (独自ルールエンジン)</label>
            </div>
        </div>
        <button class="close-settings" id="close-settings">設定を閉じる</button>
    </div>

    <!-- 起動時オーバーレイ -->
    <div id="overlay">
        <div class="spinner"></div>
        <div id="overlay-text">Bridgeサーバーを探しています...</div>
        <div style="font-size:10px; color:#888; margin-top:8px;">Node.jsサーバーを起動してください</div>
    </div>

    <div id="chat-container">
        <!-- Messages go here -->
    </div>

    <div class="input-area">
        <textarea id="chat-input" placeholder="InDesignへの指示を入力..." rows="1"></textarea>
        <button id="send-btn" disabled>送信</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
