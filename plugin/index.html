<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ai-inDesign</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #2a2a2a;
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 20px;
            text-align: center;
        }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; color: #fff; }
        .app-name { font-size: 10px; color: #FF3366; letter-spacing: 2px; text-transform: uppercase; }
        .status-ring {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 4px solid #444;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            transition: border-color 0.4s;
        }
        .status-ring.connected    { border-color: #2ecc71; animation: pulse 2s infinite; }
        .status-ring.disconnected { border-color: #e74c3c; }
        .status-ring.connecting   { border-color: #f39c12; }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
            50%      { box-shadow: 0 0 0 8px rgba(46,204,113,0); }
        }
        #status-label { font-size: 11px; color: #aaa; min-height: 16px; }
        .hint { font-size: 10px; color: #666; line-height: 1.5; max-width: 200px; }
        .hint.show { color: #999; }

        .test-btn {
            background: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: none;
        }
        .test-btn:hover { background: #27ae60; }
        .test-btn:active { transform: scale(0.95); }
        .test-btn.show { display: block; }

        #test-result {
            font-size: 10px;
            color: #aaa;
            min-height: 14px;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="logo">Ai-inDesign</div>
    <div class="app-name">InDesign</div>

    <div id="status-ring" class="status-ring connecting">🔌</div>
    <div id="status-label">Bridgeサーバーに接続中...</div>

    <button id="test-btn" class="test-btn" onclick="sendTest()">テスト送信</button>
    <div id="test-result"></div>

    <div class="hint" id="hint">
        Claude Desktop から<br>InDesignを操作できます
    </div>

    <script src="index.js"></script>
</body>
</html>
