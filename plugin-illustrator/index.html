<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ai-inDesign for Illustrator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #2a2a2a;
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px;
            text-align: center;
        }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; color: #fff; }
        .app-name { font-size: 10px; color: #FF9A00; letter-spacing: 2px; text-transform: uppercase; }
        .status-ring {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 4px solid #444;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            transition: border-color 0.4s;
        }
        .status-ring.connected    { border-color: #2ecc71; animation: pulse 2s infinite; }
        .status-ring.disconnected { border-color: #e74c3c; }
        .status-ring.connecting   { border-color: #FF9A00; }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
            50%      { box-shadow: 0 0 0 8px rgba(46,204,113,0); }
        }
        #status-label { font-size: 11px; color: #aaa; min-height: 16px; }
        .hint { font-size: 10px; color: #666; line-height: 1.5; max-width: 200px; }
        .hint.show { color: #999; }
    </style>
</head>
<body>
    <div class="logo">Ai-inDesign</div>
    <div class="app-name">Illustrator</div>
    <div id="status-ring" class="status-ring connecting">🔌</div>
    <div id="status-label">Bridgeサーバーに接続中...</div>
    <div class="hint" id="hint">
        Claude Desktop から<br>Illustratorを操作できます
    </div>
    <script src="index.js"></script>
</body>
</html>
